<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenMove | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container nav-content">
      <div class="logo">
        <span class="logo-icon">🌿</span> GreenMove
      </div>
    </div>
  </header>

  <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel" style="width: 100%; max-width: 400px;">
      <h2 class="text-center text-gradient mb-4">Welcome Back</h2>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" required value="arjun@techcorp.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required value="password123">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
      </form>
      
      <p class="text-center mt-4 text-muted" style="font-size: 0.9rem;">
        Demo accounts:<br>
        Commuter: arjun@techcorp.com<br>
        Employer: hr@techcorp.com<br>
        City Planner: planner@blr.gov.in<br>
        (Password: password123)
      </p>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const data = await apiCall('/auth/login', 'POST', { email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('user_name', data.name);
        
        if (data.role === 'commuter') window.location.href = 'commuter.html';
        else if (data.role === 'employer') window.location.href = 'employer.html';
        else if (data.role === 'city_planner') window.location.href = 'analytics.html';
      } catch (err) {
        showToast(err.message);
      }
    });

    // Auto redirect if already logged in
    if (localStorage.getItem('token')) {
      const role = localStorage.getItem('role');
      if (role === 'commuter') window.location.href = 'commuter.html';
      else if (role === 'employer') window.location.href = 'employer.html';
      else if (role === 'city_planner') window.location.href = 'analytics.html';
    }
  </script>
</body>
</html>
